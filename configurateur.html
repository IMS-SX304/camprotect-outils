<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurateur de système Ajax — CamProtect</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{background:#f5f5f5;}
:root{
  --bg:#f5f5f5;--white:#fff;--dark:#111;--orange:#E85D04;--orange-light:#fff3ec;
  --orange-border:#ffd4b8;--border:#e5e7eb;--text:#1a1a1a;--sub:#6b7280;
  --radius:12px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:'DM Sans',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh;}

/* ── HEADER ── */
.header{background:var(--dark);padding:16px 24px;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--orange);}
.header-logo{font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.5px;}
.header-logo span{color:var(--orange);}
.header-sub{font-size:12px;color:rgba(255,255,255,.5);margin-left:auto;}

/* ── PROGRESS ── */
.progress{background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;}
.progress-inner{max-width:720px;margin:0 auto;display:flex;align-items:flex-start;padding:14px 0;gap:0;}
.step-dot{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;position:relative;}
.step-dot:not(:last-child)::after{content:'';position:absolute;left:calc(50% + 18px);right:calc(-50% + 18px);top:15px;height:2px;background:var(--border);z-index:0;}
.step-dot.done::after{background:var(--orange);}
.step-num{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--sub);background:var(--white);z-index:1;flex-shrink:0;transition:all .2s;}
.step-dot.active .step-num{border-color:var(--orange);color:var(--orange);background:var(--orange-light);}
.step-dot.done .step-num{border-color:var(--orange);background:var(--orange);color:#fff;}
.step-label{font-size:10px;font-weight:600;color:var(--sub);text-align:center;line-height:1.2;white-space:nowrap;}
@media(max-width:500px){.step-label{display:none;}}
.step-dot.active .step-label{color:var(--orange);}
.step-dot.done .step-label{color:var(--dark);}

/* ── MAIN ── */
.main{max-width:720px;margin:0 auto;padding:32px 16px 64px;}

/* ── STEP TITLE ── */
.step-title{font-size:26px;font-weight:800;text-align:center;margin-bottom:32px;color:var(--dark);}

/* ── RADIO OPTIONS ── */
.options{display:flex;flex-direction:column;gap:10px;}
.opt{background:var(--white);border:2px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s;}
.opt:hover{border-color:var(--orange-border);background:var(--orange-light);}
.opt.selected{border-color:var(--orange);background:var(--orange-light);}
.opt-radio{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.opt.selected .opt-radio{border-color:var(--orange);background:var(--orange);}
.opt.selected .opt-radio::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff;}
.opt-icon{font-size:22px;flex-shrink:0;}
.opt-text{font-size:15px;font-weight:600;}

/* ── CHECKBOXES ── */
.group-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;}
.group-header{padding:14px 20px;font-size:14px;font-weight:700;color:var(--dark);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.group-header .chevron{transition:transform .2s;color:var(--sub);}
.group-header.open .chevron{transform:rotate(180deg);}
.group-body{display:none;}
.group-body.open{display:block;}
.group-sub{padding:8px 20px 4px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--sub);}
.chk-item{padding:14px 20px;display:flex;align-items:flex-start;gap:12px;border-top:1px solid var(--border);cursor:pointer;transition:background .1s;}
.chk-item:first-of-type{border-top:none;}
.chk-item:hover{background:var(--orange-light);}
.chk-item.checked{background:var(--orange-light);}
.chk-box{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.chk-item.checked .chk-box{border-color:var(--orange);background:var(--orange);}
.chk-item.checked .chk-box::after{content:'✓';color:#fff;font-size:11px;font-weight:700;}
.chk-name{font-size:14px;font-weight:600;color:var(--dark);}
.chk-desc{font-size:12px;color:var(--sub);margin-top:2px;line-height:1.5;}

/* ── SPINNERS ── */
.params{display:flex;flex-direction:column;gap:10px;}
.param-row{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;display:flex;align-items:center;gap:14px;}
.param-icon{font-size:22px;flex-shrink:0;}
.param-info{flex:1;}
.param-name{font-size:14px;font-weight:700;}
.param-desc{font-size:12px;color:var(--sub);margin-top:2px;line-height:1.4;}
.spinner{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.spin-btn{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--dark);transition:all .15s;font-weight:700;}
.spin-btn:hover{border-color:var(--orange);color:var(--orange);}
.spin-val{width:52px;text-align:center;font-size:16px;font-weight:700;border:1.5px solid var(--border);border-radius:8px;padding:6px;background:var(--white);}

/* ── NAVIGATION ── */
.nav{display:flex;gap:12px;justify-content:space-between;margin-top:32px;}
.btn{padding:13px 28px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;}
.btn-back{background:var(--white);color:var(--dark);border:1.5px solid var(--border);}
.btn-back:hover{border-color:var(--orange);color:var(--orange);}
.btn-next{background:var(--orange);color:#fff;flex:1;font-size:15px;}
.btn-next:hover{background:#d14e00;}
.btn-next:disabled{background:#e5e7eb;color:var(--sub);cursor:not-allowed;}

/* ── RESULT ── */
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.result-title{font-size:22px;font-weight:800;}
.result-total-box{background:var(--dark);color:#fff;border-radius:10px;padding:10px 20px;text-align:right;}
.result-total-label{font-size:11px;color:rgba(255,255,255,.5);}
.result-total-val{font-size:22px;font-weight:800;color:var(--orange);}
.result-note{background:var(--orange-light);border:1px solid var(--orange-border);border-radius:10px;padding:12px 16px;font-size:13px;color:#7c3800;margin-bottom:20px;display:flex;gap:8px;}
.result-category{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);margin:20px 0 10px;}
.product-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:8px;display:flex;align-items:center;gap:14px;}
.prod-img{width:52px;height:52px;object-fit:contain;flex-shrink:0;background:#f9f9f9;border-radius:8px;border:1px solid var(--border);}
.prod-img-placeholder{width:52px;height:52px;background:#f0f0f0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.prod-info{flex:1;min-width:0;}
.prod-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-desc{font-size:12px;color:var(--sub);margin-top:2px;}
.prod-right{display:flex;align-items:center;gap:14px;flex-shrink:0;}
.prod-qty{display:flex;align-items:center;gap:6px;}
.qty-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border);background:var(--white);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-weight:700;}
.qty-btn:hover{border-color:var(--orange);color:var(--orange);}
.qty-val{width:36px;text-align:center;font-size:14px;font-weight:700;}
.prod-price{text-align:right;min-width:70px;}
.prod-price-val{font-size:16px;font-weight:800;color:var(--dark);}
.prod-price-unit{font-size:11px;color:var(--sub);}
.prod-del{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:14px;transition:all .15s;}
.prod-del:hover{border-color:#ef4444;color:#ef4444;}
.prod-link{font-size:11px;color:var(--orange);text-decoration:none;font-weight:600;margin-top:3px;display:block;}
.result-footer{margin-top:24px;display:flex;gap:12px;flex-wrap:wrap;}
.btn-print{background:var(--dark);color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;}
.btn-print:hover{background:#333;}
.btn-restart{background:var(--white);color:var(--dark);border:1.5px solid var(--border);padding:12px 24px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-restart:hover{border-color:var(--orange);color:var(--orange);}

/* ── PRINT ── */
@media print{
  .header,.progress,.nav,.result-footer,.prod-qty,.prod-del,.prod-link,.sticky-total,
  button[onclick*="toggleColor"],.print-instruction{display:none!important;}
  body{background:#fff;}
  .main{padding:0 16px;}
  .product-card{break-inside:avoid;}
  .result-header{display:none!important;}
  .print-header{display:flex!important;}
  .print-totals{display:block!important;}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}

/* ── PRINT HEADER & TOTALS ── */
.print-header{display:none;justify-content:space-between;align-items:center;padding:16px 0 20px;border-bottom:2px solid #E85D04;margin-bottom:24px;}
.print-logo img{max-height:36px;width:auto;}
.print-date{font-size:12px;color:#6b7280;text-align:right;line-height:1.6;}
.print-totals{display:none;margin-top:28px;border-top:2px solid #111;padding-top:20px;}
.print-total-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #e5e7eb;font-size:14px;}
.print-total-row.main{font-size:17px;font-weight:800;border-bottom:none;padding-top:12px;}
.print-total-row .label{color:#6b7280;}
.print-total-row.main .label{color:#111;}
.print-total-row .val{font-weight:700;color:#111;}
.print-total-row.main .val{color:#E85D04;font-size:20px;}

/* ── ANIM ── */
.step-page{animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

/* ── TOTAL STICKY ── */
.sticky-total{position:fixed;bottom:0;left:0;right:0;background:var(--dark);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;z-index:100;transform:translateY(100%);transition:transform .25s;}
.sticky-total.show{transform:none;}
.st-label{font-size:13px;color:rgba(255,255,255,.6);}
.st-val{font-size:18px;font-weight:800;color:var(--orange);}
</style>
</head>

// ── MOTEUR DE RECOMMANDATION ──────────────────────────
function buildRecommendation() {
  const { type, features, params, extras } = S;
  const { floors, rooms, entries, windows, area } = params;
  const res = {};

  function add(key, qty) {
    if (!CATALOG[key]) return;
    res[key] = (res[key] || 0) + qty;
  }

  // CENTRALE — toujours Hub 4G sauf Hub Plus si grand système
  const totalDevicesEst = rooms * 2 + entries + windows + (features.has('outdoor') ? 3 : 0);
  if (totalDevicesEst > 80 || type === 'entreprise') add('hub_p', 1);
  else add('hub', 1); // Hub 2 4G par défaut

  // RÉPÉTEUR si plusieurs étages ou grande surface
  if (floors > 1 || area > 150) add('rex', Math.min(floors - 1 + (area > 200 ? 1 : 0), 3));

  // SÉCURITÉ INTÉRIEURE
  if (features.has('indoor')) {
    const pirKey = extras.has('photo_verif') ? 'mc' : 'mp';
    add(pirKey, Math.max(1, rooms));
    add('dp', entries);
    if (windows > 0) add('gp', Math.min(windows, Math.ceil(windows / 2)));
    add('hs', 1);
  }

  // SÉCURITÉ EXTÉRIEURE
  if (features.has('outdoor')) {
    const pirOutKey = extras.has('photo_verif') ? 'mc_o' : 'mp_o';
    add(pirOutKey, Math.max(1, Math.ceil(area / 100)));
    add('ss', 1);
    if (extras.has('perimeter')) add('mc_c', Math.max(1, entries));
  }

  // GARAGE
  if (extras.has('garage')) add('mc_c', 1);

  // COFFRE-FORT
  if (extras.has('safe')) add('mp_p', 1);

  // CLAVIER
  if (extras.has('keypad') || features.has('indoor')) {
    const kpKey = (type === 'entreprise' || type === 'bureau') ? 'kp_p' : 'kp';
    add(kpKey, entries);
  }

  // PÉRIMÈTRE
  if (extras.has('perimeter') && !features.has('outdoor')) add('mc_c', entries);

  // CAMÉRAS IR (filaires infrarouge)
  if (features.has('cam_ir')) {
    const camQty = (type === 'apt' || type === 'maison')
      ? Math.max(1, Math.ceil(rooms / 3))
      : Math.max(1, Math.ceil(area / 80));
    add('tc28', camQty);
  }

  // CAMÉRAS HYBRIDE/DÔME
  if (features.has('cam_hybrid')) {
    add('dc28', Math.max(1, Math.ceil(rooms / 4)));
  }

  // NVR — ajouté dès que sélectionné, avec caméras si aucune autre sélectionnée
  if (features.has('nvr') || features.has('nvr_hdmi')) {
    const totalCams = (res.tc28 || 0) + (res.bc28 || 0) + (res.dc28 || 0);
    // Si pas de caméras sélectionnées, en ajouter automatiquement
    const camCount = totalCams > 0 ? totalCams : Math.max(2, Math.ceil(rooms / 3));
    if (totalCams === 0) add('tc28', camCount);
    const finalCams = (res.tc28 || 0) + (res.bc28 || 0) + (res.dc28 || 0);
    // NVR adapté
    const useHdmi = features.has('nvr_hdmi');
    if (useHdmi) {
      add(finalCams > 8 ? 'nvr16h' : 'nvr8h', 1);
    } else {
      add(finalCams > 8 ? 'nvr16' : 'nvr8', 1);
    }
    // Switch PoE adapté au nombre de caméras
    if (finalCams <= 4) add('sw4', 1);
    else if (finalCams <= 8) add('sw8', 1);
    else add('sw16', 1);
    // Disque dur
    add('hdd', 1);
  } else if (features.has('cam_ir') || features.has('cam_hybrid')) {
    // Caméras sans NVR : ajouter quand même un switch PoE
    const totalCams = (res.tc28 || 0) + (res.bc28 || 0) + (res.dc28 || 0);
    if (totalCams <= 4) add('sw4', 1);
    else if (totalCams <= 8) add('sw8', 1);
    else add('sw16', 1);
  }

  // SÉCURITÉ INCENDIE
  if (type === 'entreprise' || extras.has('fire')) {
    add('fp', Math.max(1, Math.ceil(rooms / 3)));
  }

  // Convertir en tableau avec support couleur
  return Object.entries(res)
    .filter(([,qty]) => qty > 0)
    .map(([key, qty]) => ({
      key, qty,
      name: CATALOG[key].name,
      desc: CATALOG[key].desc,
      cat: CATALOG[key].cat,
      icon: CATALOG[key].icon,
      unitPrice: CATALOG[key].price,
      url: CATALOG[key].url,
      plannerKey: CATALOG[key].plannerKey,
      img: '',
      color: 'blanc', // blanc | noir
    }));
}

// ── CALCUL TOTAL ──────────────────────────────────────
function calcTotal(products) {
  return products.reduce((t, p) => t + p.unitPrice * p.qty, 0);
}

function fmtPrice(val) {
  return val.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}

// ── RENDU PAR ÉTAPE ───────────────────────────────────
function render() {
  const app = document.getElementById('app');
  const dots = [1,2,3,4,5];
  dots.forEach(i => {
    const d = document.getElementById('sdot-' + i);
    d.className = 'step-dot' + (i === S.step ? ' active' : i < S.step ? ' done' : '');
  });

  switch(S.step) {
    case 1: app.innerHTML = renderStep1(); break;
    case 2: app.innerHTML = renderStep2(); break;
    case 3: app.innerHTML = renderStep3(); break;
    case 4: app.innerHTML = renderStep4(); break;
    case 5: renderResult(); return;
  }
  document.getElementById('sticky-total').classList.remove('show');
}

function toggleGrp(key) {
  if (!S.grpOpen) S.grpOpen = { grp_intrusion: true, grp_video: false };

  // Toggle DOM directly without full re-render

  cards.forEach(card => {
    const header = card.querySelector('.group-header');
    const body = card.querySelector('.group-body');
    const onclick = header.getAttribute('onclick');
    if (onclick && onclick.includes(key)) {
      header.classList.toggle('open', S.grpOpen[key]);
      body.classList.toggle('open', S.grpOpen[key]);
    }
  });
}

function toggleFeatureOnly(key) {
  S.features.has(key) ? S.features.delete(key) : S.features.add(key);
  // Update DOM directly without re-render (avoids accordion closing)
  document.querySelectorAll('.chk-item').forEach(el => {
    const onclick = el.getAttribute('onclick');
    if (onclick && onclick.includes(`'${key}'`)) {
      el.classList.toggle('checked', S.features.has(key));
    }
  });
  // Update next button state
  const btn = document.querySelector('.btn-next');
  if (btn) btn.disabled = S.features.size === 0;
  // Update/remove validation message
  const existing = document.querySelector('.step2-warning');
  if (existing) existing.style.display = S.features.size > 0 ? 'none' : 'block';
}

function nextStep2() {
  if (S.features.size === 0) return;
  nextStep();

function toggleGroup(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function toggleFeature(key) {
  S.features.has(key) ? S.features.delete(key) : S.features.add(key);
  render();
}

            <div style="display:flex;align-items:center;gap:8px;margin-top:5px;">
              <button onclick="toggleColor('${p.key}','blanc')" id="cblanc-${p.key}" style="width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid var(--orange);cursor:pointer;" title="Blanc"></button>
              ${CATALOG[p.key]?.imgNoir ? `<button onclick="toggleColor('${p.key}','noir')" id="cnoir-${p.key}" style="width:18px;height:18px;border-radius:50%;background:#222;border:2px solid #ccc;cursor:pointer;" title="Noir"></button>` : ''}
              <a class="prod-link" href="${p.url}" target="_blank">Voir sur CamProtect →</a>
            </div>
          </div>
          <div class="prod-right">
            <div class="prod-qty">
              <button class="qty-btn" onclick="changeQty('${p.key}',-1)">−</button>
              <div class="qty-val" id="qty-${p.key}">${p.qty}</div>
              <button class="qty-btn" onclick="changeQty('${p.key}',1)">+</button>
            </div>
            <div class="prod-price">
              <div class="prod-price-val" id="price-${p.key}">${fmtPrice(p.unitPrice * p.qty)}</div>
              <div class="prod-price-unit">${fmtPrice(p.unitPrice)} / unité HT</div>
            </div>
            <button class="prod-del" onclick="removeProduct('${p.key}')" title="Supprimer">✕</button>
          </div>
        </div>`;
      });
    });

    html += `
      <!-- Totaux en bas — visibles uniquement à l'impression -->
      <div class="print-totals" id="print-totals">
        <div class="print-total-row">
          <span class="label">Total HT</span>
          <span class="val" id="print-ht">${fmtPrice(total)}</span>
        </div>
        <div class="print-total-row">
          <span class="label">TVA (20%)</span>
          <span class="val" id="print-tva">${fmtPrice(tva)}</span>
        </div>
        <div class="print-total-row main">
          <span class="label">Total TTC</span>
          <span class="val" id="print-ttc">${fmtPrice(ttc)}</span>
        </div>
      </div>
      <div class="result-footer">
        <button class="btn-print" onclick="printDevis()">🖨 Imprimer / PDF</button>
        <button class="btn-restart" onclick="restart()">↩ Recommencer</button>
      </div>
    </div>`;

    app.innerHTML = html;
    updateStickyTotal();
    document.getElementById('sticky-total').classList.add('show');
    document.getElementById('sdot-5').className = 'step-dot active';
  });
}

async function fetchPrices() {
  try {
    const r = await fetch('https://raw.githubusercontent.com/IMS-SX304/camprotect-json/refs/heads/main/data.json', {cache:'default'});
    if (!r.ok) return;
    const d = await r.json();
    const map = d.planner_map || {};
    // Stocker les images noir/blanc pour chaque produit
    S._plannerMap = map;
    S.products.forEach(p => {
      const pk = p.plannerKey || p.key;
      if (map[pk]) {
        if (map[pk].prix_ht) p.unitPrice = map[pk].prix_ht;
        if (map[pk].image) p.img = map[pk].image; // image blanc par défaut
      }
    });
  } catch(e) {}
}

function toggleColor(key, color) {
  const p = S.products.find(x => x.key === key);
  if (!p) return;
  p.color = color;

  // Update color button borders
  const bBlanc = document.getElementById('cblanc-' + key);
  const bNoir = document.getElementById('cnoir-' + key);
  if (bBlanc) bBlanc.style.borderColor = color === 'blanc' ? 'var(--orange)' : '#ccc';
  if (bNoir) bNoir.style.borderColor = color === 'noir' ? 'var(--orange)' : '#ccc';

  // Update product name
  const nameEl = document.getElementById('pname-' + key);
  if (nameEl) {
    const baseName = p.name.replace(/ Blanc$| Blanche$| Noir$| Noire$/, '');
    nameEl.textContent = baseName + (color === 'noir' ? ' Noir' : ' Blanc');
  }

  // Update image — utilise imgNoir depuis catalog si disponible
  const catalogEntry = CATALOG[key];
  const imgEl = document.querySelector(`#pc-${key} .prod-img`);
  const placeholderEl = document.querySelector(`#pc-${key} .prod-img-placeholder`);
  if (imgEl && catalogEntry) {
    const newSrc = color === 'noir'
      ? (catalogEntry.imgNoir || catalogEntry.img || p.img)
      : (catalogEntry.img || p.img);
    if (newSrc) {
      imgEl.src = newSrc;
      imgEl.style.display = '';
      if (placeholderEl) placeholderEl.style.display = 'none';
    }
  }

  // Update URL vers la version couleur correcte
  const linkEl = document.querySelector(`#pc-${key} .prod-link`);
  if (linkEl && catalogEntry) {
    const baseUrl = color === 'noir'
      ? catalogEntry.url.replace('-blanc', '-noir').replace('-blanche', '-noire')
      : catalogEntry.url;
    linkEl.href = baseUrl;
  }
}

function changeQty(key, delta) {
  const p = S.products.find(x => x.key === key);
  if (!p) return;
  p.qty = Math.max(0, p.qty + delta);
  if (p.qty === 0) {
    removeProduct(key); return;
  }
  document.getElementById('qty-' + key).textContent = p.qty;
  document.getElementById('price-' + key).textContent = fmtPrice(p.unitPrice * p.qty);
  updateStickyTotal();
}

function removeProduct(key) {
  S.products = S.products.filter(p => p.key !== key);
  const el = document.getElementById('pc-' + key);
  if (el) el.remove();
  updateStickyTotal();
}

function showPrintTip() {
  printDevis();
}

function printDevis() {
  const total = calcTotal(S.products);
  const tva = total * 0.2;
  const ttc = total * 1.2;
  const now = new Date();
  const dateStr = now.toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric'});
  const timeStr = now.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
  const logoUrl = 'https://cdn.prod.website-files.com/66e1f578f9f545dee86c9a91/672ca6fb548c6879fedaea63_Design%20sans%20titre%20(5).svg';

  // Construire les lignes produits
  const catOrder = ['Centrales','Infrastructure','Protection contre les intrusions','Sirènes','Accès','Vidéosurveillance','Enregistreurs vidéo','Réseau','Stockage','Sécurité incendie'];
  const byCategory = {};
  S.products.forEach(p => { if (!byCategory[p.cat]) byCategory[p.cat]=[]; byCategory[p.cat].push(p); });

  let prodRows = '';
  catOrder.forEach(cat => {
    const items = byCategory[cat];
    if (!items) return;
    prodRows += `<tr><td colspan="4" style="padding:10px 0 4px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#6b7280;border-bottom:1px solid #e5e7eb;">${cat}</td></tr>`;
    items.forEach(p => {
      const imgSrc = p.img || CATALOG[p.key]?.img || '';
      prodRows += `<tr style="border-bottom:1px solid #f0f0f0;">
        <td style="padding:10px 8px;"><img src="${imgSrc}" style="width:40px;height:40px;object-fit:contain;" onerror="this.style.display='none'"></td>
        <td style="padding:10px 8px;font-size:13px;"><strong>${p.name}</strong><br><span style="color:#6b7280;font-size:11px;">${p.desc}</span></td>
        <td style="padding:10px 8px;text-align:center;font-size:13px;font-weight:600;">${p.qty}</td>
        <td style="padding:10px 8px;text-align:right;font-size:13px;font-weight:700;">${fmtPrice(p.unitPrice * p.qty)}</td>
      </tr>`;
    });
  });

  const html = `<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8">
  <title>Configuration Ajax — CamProtect</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;color:#111;background:#fff;padding:32px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .header{display:flex;justify-content:space-between;align-items:center;padding-bottom:20px;border-bottom:2px solid #E85D04;margin-bottom:28px;}
    .logo-box{display:inline-block;border-radius:8px;overflow:hidden;line-height:0;}
    .logo-box img{height:34px;width:auto;display:block;padding:8px 14px;background:#1a1a1a;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .date{font-size:12px;color:#6b7280;text-align:right;line-height:1.7;}
    table{width:100%;border-collapse:collapse;}
    .totals{margin-top:28px;border-top:2px solid #111;padding-top:16px;}
    .tot-row{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;border-bottom:1px solid #e5e7eb;}
    .tot-row.ttc{font-size:18px;font-weight:800;border-bottom:none;padding-top:12px;}
    .tot-row.ttc .v{color:#E85D04;}
    .l{color:#6b7280;}.tot-row.ttc .l{color:#111;}
    @media print{body{padding:0;}}
  </style></head><body>
  <div class="header">
    <div class="logo-box"><img src="${logoUrl}" alt="CamProtect"></div>
    <div class="date">Généré le ${dateStr} à ${timeStr}<br>Configuration système Ajax</div>
  </div>
  <table>
    <thead><tr style="background:#f9f9f9;">
      <th style="padding:8px;text-align:left;font-size:11px;color:#6b7280;width:52px;"></th>
      <th style="padding:8px;text-align:left;font-size:11px;color:#6b7280;">Produit</th>
      <th style="padding:8px;text-align:center;font-size:11px;color:#6b7280;width:60px;">Qté</th>
      <th style="padding:8px;text-align:right;font-size:11px;color:#6b7280;width:100px;">Prix HT</th>
    </tr></thead>
    <tbody>${prodRows}</tbody>
  </table>
  <div class="totals">
    <div class="tot-row"><span class="l">Total HT</span><span class="v">${fmtPrice(total)}</span></div>
    <div class="tot-row"><span class="l">TVA (20%)</span><span class="v">${fmtPrice(tva)}</span></div>
    <div class="tot-row ttc"><span class="l">Total TTC</span><span class="v">${fmtPrice(ttc)}</span></div>
  </div>
  <script>window.onload=function(){window.print();window.onafterprint=function(){window.close();};}<\/script>
  </body></html>`;

  const w = window.open('', '_blank', 'width=900,height=700');
  if (w) { w.document.write(html); w.document.close(); }
  else { window.print(); } // fallback si popup bloqué
}

function updateStickyTotal() {
  const total = calcTotal(S.products);
  document.getElementById('st-val').textContent = fmtPrice(total);
  const rBox = document.getElementById('result-total-val');
  if (rBox) rBox.textContent = fmtPrice(total);
  // Mettre à jour les totaux print
  const tva = total * 0.2;
  const ttc = total * 1.2;
  const elHT = document.getElementById('print-ht');
  const elTVA = document.getElementById('print-tva');
  const elTTC = document.getElementById('print-ttc');
  if (elHT) elHT.textContent = fmtPrice(total);
  if (elTVA) elTVA.textContent = fmtPrice(tva);
  if (elTTC) elTTC.textContent = fmtPrice(ttc);
}

// ── NAVIGATION ────────────────────────────────────────
function nextStep() { if (S.step < 4) { S.step++; render(); window.scrollTo(0,0); } }
function prevStep() { if (S.step > 1) { S.step--; render(); window.scrollTo(0,0); } }
function restart() {
  S.step = 1; S.type = null;
  S.features = new Set(); S.extras = new Set();
  S.params = { floors:1, rooms:5, entries:1, windows:4, area:80 };
  S.products = [];
  render(); window.scrollTo(0,0);
}

// ── INIT ─────────────────────────────────────────────
render();
</script>
</body>
</html>
