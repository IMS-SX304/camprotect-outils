<title>Configurateur Ajax — CamProtect</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#f5f5f5;}
:root{--bg:#f5f5f5;--white:#fff;--dark:#111;--orange:#E85D04;--ol:#fff3ec;--ob:#ffd4b8;--border:#e5e7eb;--text:#1a1a1a;--sub:#6b7280;--r:12px;}
body{font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;}
.hd{background:#111;padding:16px 24px;display:flex;align-items:center;gap:12px;border-bottom:3px solid var(--orange);}
.hl{font-size:18px;font-weight:800;color:#fff;}.hl span{color:var(--orange);}
.hs{font-size:13px;color:rgba(255,255,255,.6);font-weight:600;margin-left:auto;}
.pg{background:var(--white);border-bottom:1px solid var(--border);padding:0 16px;}
.pgi{max-width:720px;margin:0 auto;display:flex;align-items:flex-start;padding:14px 0;}
.sd{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;position:relative;}
.sd:not(:last-child)::after{content:'';position:absolute;left:calc(50% + 18px);right:calc(-50% + 18px);top:15px;height:2px;background:var(--border);z-index:0;}
.sd.done::after{background:var(--orange);}
.sn{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--sub);background:var(--white);z-index:1;flex-shrink:0;transition:all .2s;}
.sd.active .sn{border-color:var(--orange);color:var(--orange);background:var(--ol);}
.sd.done .sn{border-color:var(--orange);background:var(--orange);color:#fff;}
.sl{font-size:10px;font-weight:600;color:var(--sub);text-align:center;white-space:nowrap;}
.sd.active .sl{color:var(--orange);}
.sd.done .sl{color:var(--dark);}
@media(max-width:480px){.sl{display:none;}}
.main{max-width:720px;margin:0 auto;padding:28px 16px 80px;}
.spage{animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.stit{font-size:clamp(20px,4vw,26px);font-weight:800;text-align:center;margin-bottom:28px;}
.opts{display:flex;flex-direction:column;gap:10px;}
.opt{background:var(--white);border:2px solid var(--border);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .15s;}
.opt:hover{border-color:var(--ob);background:var(--ol);}
.opt.sel{border-color:var(--orange);background:var(--ol);}
.orad{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.opt.sel .orad{border-color:var(--orange);background:var(--orange);}
.opt.sel .orad::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff;}
.oico{font-size:20px;flex-shrink:0;}
.otxt{font-size:15px;font-weight:600;}
.gc{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;}
.gh{padding:14px 18px;font-size:14px;font-weight:700;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;}
.gh .chv{transition:transform .2s;color:var(--sub);font-size:12px;}
.gh.op .chv{transform:rotate(180deg);}
.gb{display:none;}.gb.op{display:block;}
.gsub{padding:8px 18px 4px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--sub);background:#fafafa;}
.ci{padding:13px 18px;display:flex;align-items:flex-start;gap:12px;border-top:1px solid var(--border);cursor:pointer;transition:background .1s;}
.ci:hover{background:var(--ol);}
.ci.chk{background:var(--ol);}
.cb{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ci.chk .cb{border-color:var(--orange);background:var(--orange);}
.ci.chk .cb::after{content:'checkmark';font-size:0;width:10px;height:7px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg);margin-top:-2px;}
.cn{font-size:14px;font-weight:600;}
.cd{font-size:12px;color:var(--sub);margin-top:2px;line-height:1.5;}
.params{display:flex;flex-direction:column;gap:10px;}
.pr{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:14px;}
.pico{font-size:20px;flex-shrink:0;}
.pi2{flex:1;min-width:0;}
.pn{font-size:14px;font-weight:700;}
.pd{font-size:12px;color:var(--sub);margin-top:2px;line-height:1.4;}
.sp{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sb{width:32px;height:32px;border-radius:7px;border:1.5px solid var(--border);background:var(--white);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--dark);font-weight:700;transition:all .15s;}
.sb:hover{border-color:var(--orange);color:var(--orange);}
.sv{width:52px;text-align:center;font-size:15px;font-weight:700;border:1.5px solid var(--border);border-radius:7px;padding:6px;background:var(--white);}
.cf{display:flex;flex-direction:column;gap:14px;}
.cfr{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.cff{display:flex;flex-direction:column;gap:5px;}
.cfl{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;}
.cfi{background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;transition:border-color .15s;width:100%;}
.cfi:focus{border-color:var(--orange);}
.nav{display:flex;gap:10px;margin-top:28px;}
.btn{padding:12px 24px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s;}
.bbk{background:var(--white);color:var(--dark);border:1.5px solid var(--border);}
.bbk:hover{border-color:var(--orange);color:var(--orange);}
.bnx{background:var(--orange);color:#fff;flex:1;font-size:15px;}
.bnx:hover{background:#d14e00;}
.bnx:disabled{background:var(--border);color:var(--sub);cursor:not-allowed;}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.rt{font-size:20px;font-weight:800;}
.rtb{background:var(--dark);color:#fff;border-radius:10px;padding:10px 18px;text-align:right;}
.rtbl{font-size:11px;color:rgba(255,255,255,.5);}
.rtbv{font-size:20px;font-weight:800;color:var(--orange);}
.rcat{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--sub);margin:18px 0 8px;}
.pc{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.pimg{width:48px;height:48px;object-fit:contain;flex-shrink:0;background:#f9f9f9;border-radius:8px;border:1px solid var(--border);}
.pph{width:48px;height:48px;background:#f0f0f0;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.pinf{flex:1;min-width:0;}
.pnm{font-size:13px;font-weight:700;}
.pds{font-size:12px;color:var(--sub);margin-top:2px;}
.pco{display:flex;align-items:center;gap:6px;margin-top:5px;}
.pcb{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid #ccc;transition:border-color .15s;}
.pl{font-size:11px;color:var(--orange);text-decoration:none;font-weight:600;}
.pr2{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.pq{display:flex;align-items:center;gap:6px;}
.qb{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border);background:var(--white);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .15s;}
.qb:hover{border-color:var(--orange);color:var(--orange);}
.qv{width:32px;text-align:center;font-size:13px;font-weight:700;}
.ppr{text-align:right;min-width:70px;}
.pprv{font-size:15px;font-weight:800;}
.ppru{font-size:11px;color:var(--sub);}
.pdl{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:13px;transition:all .15s;}
.pdl:hover{border-color:#ef4444;color:#ef4444;}
.rf{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;}
.bpr{background:var(--dark);color:#fff;padding:12px 22px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;}
.bpr:hover{background:#333;}
.brs{background:var(--white);color:var(--dark);border:1.5px solid var(--border);padding:12px 22px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;}
.brs:hover{border-color:var(--orange);color:var(--orange);}
.ptot{display:none;margin-top:24px;border-top:2px solid var(--dark);padding-top:18px;}
.totr{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;border-bottom:1px solid var(--border);}
.totr.ttc{font-size:17px;font-weight:800;border-bottom:none;padding-top:12px;}
.totr .tl{color:var(--sub);}
.totr.ttc .tl{color:var(--dark);}
.totr.ttc .tv{color:var(--orange);font-size:18px;}
.stk{position:fixed;bottom:0;left:0;right:0;background:var(--dark);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;z-index:100;transform:translateY(100%);transition:transform .25s;}
.stk.show{transform:none;}
.stl{font-size:13px;color:rgba(255,255,255,.6);}
.stv{font-size:18px;font-weight:800;color:var(--orange);}
.warn{text-align:center;font-size:13px;color:var(--orange);margin-top:8px;}
@media(max-width:600px){
  .cfr{grid-template-columns:1fr;}
  .rh{flex-direction:column;align-items:flex-start;}
  .rtb{width:100%;}
  .pc{flex-wrap:wrap;}
  .pr2{width:100%;justify-content:flex-end;}
  .hd{padding:12px 16px;}
  .hs{display:none;}
}
@media print{
  .hd,.pg,.nav,.rf,.stk,button{display:none!important;}
  body{background:#fff;}
  .main{padding:0;}
  .pc{break-inside:avoid;}
  .rh{display:none!important;}
  .ph{display:flex!important;}
  .ptot{display:block!important;}
}
.ph{display:none;justify-content:space-between;align-items:center;padding-bottom:16px;border-bottom:2px solid var(--orange);margin-bottom:20px;}
.ph img{height:32px;display:block;padding:8px 14px;background:#1a1a1a;border-radius:8px;}
.phd{font-size:12px;color:var(--sub);text-align:right;line-height:1.7;}
</style>
</head>

function buildReco(){
  var t=ST.type, f=ST.feat, p=ST.par, e=ST.ext;
  var fl=p.floors, ro=p.rooms, en=p.entries, wi=p.windows, ar=p.area;
  var res={};
  function add(k,q){ if(CAT[k]) res[k]=(res[k]||0)+q; }

  var est=ro*2+en+wi+(f.outdoor?3:0);
  if(est>80||t==='ent') add('hubp',1); else add('hub',1);
  if(fl>1||ar>150) add('rex',Math.min(fl-1+(ar>200?1:0),3));

  if(f.indoor){
    var pk=e.photo_v?'mc':'mp';
    add(pk,Math.max(1,ro));
    add('dp',en);
    if(wi>0) add('gp',Math.min(wi,Math.ceil(wi/2)));
    add('hs',1);
  }
  if(f.outdoor){
    var pok=e.photo_v?'mco':'mpo';
    add(pok,Math.max(1,Math.ceil(ar/100)));
    add('ss',1);
    if(e.perim) add('mcc',Math.max(1,en));
  }
  if(e.garage) add('mcc',1);
  if(e.safe) add('mpp',1);
  if(e.kpad||f.indoor){ add((t==='ent'||t==='bur')?'kpp':'kp',en||1); }
  if(e.perim&&!f.outdoor) add('mcc',en||1);

  if(f.cam_ir){
    var cq=(t==='apt'||t==='mai')?Math.max(1,Math.ceil(ro/3)):Math.max(1,Math.ceil(ar/80));
    add('tc28',cq);
  }
  if(f.cam_hyb) add('dc28',Math.max(1,Math.ceil(ro/4)));

  if(f.nvr||f.nvr_hdmi){
    var tc=(res.tc28||0)+(res.bc28||0)+(res.dc28||0);
    if(tc===0){ var aq=Math.max(2,Math.ceil(ro/3)); add('tc28',aq); tc=aq; }
    if(f.nvr_hdmi) add(tc>8?'nvr16h':'nvr8h',1); else add(tc>8?'nvr16':'nvr8',1);
    if(tc<=4) add('sw4',1); else if(tc<=8) add('sw8',1); else add('sw16',1);
    add('hdd',1);
  } else if(f.cam_ir||f.cam_hyb){
    var tc2=(res.tc28||0)+(res.bc28||0)+(res.dc28||0);
    if(tc2<=4) add('sw4',1); else if(tc2<=8) add('sw8',1); else add('sw16',1);
  }

  if(f.fire_smoke||f.fire_co||t==='ent'){
    add(f.fire_co?'fpp':'fp',Math.max(1,Math.ceil(ro/3)));
  }
  if(e.cab90) add('cab90',1);
  if(e.cab305) add('cab305',1);

  return Object.keys(res).filter(function(k){return res[k]>0;}).map(function(k){
    return {k:k, q:res[k], p:CAT[k].p, col:'blanc'};
  });
}

function setCol(k,col){
  var pr=ST.prods.find(function(p){return p.k===k;});

  pr.col=col;

  var ph=document.querySelector('#pc-'+k+' .pph');
  if(img){ img.src=imgSrc||''; img.style.display=imgSrc?'':'none'; }
  if(ph) ph.style.display=imgSrc?'none':'flex';
  var nm=document.getElementById('pnm-'+k);
  if(nm){ var base=info.n.replace(/ Blanc$| Blanche$| Noir$| Noire$/,''); nm.textContent=base+(col==='noir'?' Noir':' Blanc'); }
  var bu=document.querySelector('#pc-'+k+' .pcb:first-of-type');
  var bn=document.getElementById('cn-'+k);
  if(bu) bu.style.borderColor=col==='blanc'?'var(--orange)':'#ccc';
  if(bn) bn.style.borderColor=col==='noir'?'var(--orange)':'#ccc';
  var ul=document.getElementById('purl-'+k);
  if(ul){
    var base2=info.url;
    ul.href='https://www.camprotect.fr/product/'+(col==='noir'?base2.replace(/-blanc$/,'-noir').replace(/-blanche$/,'-noire'):base2);
  }
}

function chgQ(k,d){
  var pr=ST.prods.find(function(p){return p.k===k;});
  if(!pr) return;
  pr.q=Math.max(0,pr.q+d);
  if(pr.q===0){ delProd(k); return; }
  var qe=document.getElementById('pq-'+k);
  if(qe) qe.textContent=pr.q;
  var pe=document.getElementById('ppr-'+k);
  if(pe) pe.textContent=fp(CAT[k].p*pr.q);
  updTotals();
}

function delProd(k){
  ST.prods=ST.prods.filter(function(p){return p.k!==k;});
  var el=document.getElementById('pc-'+k);
  if(el) el.remove();
  updTotals();
}

function updTotals(){
  var t=tot(), tva=t*0.2, ttc=t*1.2;
  var sv=document.getElementById('stv');
  if(sv) sv.textContent=fp(t);
  var rv=document.getElementById('rtbv');
  if(rv) rv.textContent=fp(t);
  var ht=document.getElementById('pht');
  if(ht) ht.textContent=fp(t);
  var tv=document.getElementById('ptva');
  if(tv) tv.textContent=fp(tva);
  var tc=document.getElementById('pttc');
  if(tc) tc.textContent=fp(ttc);
}

function doPrint(){
  var t=tot(), tva=t*0.2, ttc=t*1.2;
  var now=new Date();
  var ds=now.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
  var ts=now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  var c=ST.cli;
  var byCat={};
  ST.prods.forEach(function(pr){ if(!byCat[CAT[pr.k].c]) byCat[CAT[pr.k].c]=[]; byCat[CAT[pr.k].c].push(pr); });

  var rows='';
  CATS.forEach(function(cat){
    var items=byCat[cat];
    if(!items) return;
    rows+='<tr><td colspan="4" style="padding:10px 0 4px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#6b7280;border-bottom:1px solid #e5e7eb;">'+cat+'</td></tr>';
    items.forEach(function(pr){
      var info=CAT[pr.k];
      var img=pr.col==='noir'&&info.imgN?info.imgN:info.img;
      rows+='<tr style="border-bottom:1px solid #f0f0f0;">';
      rows+='<td style="padding:8px;"><img src="'+img+'" style="width:40px;height:40px;object-fit:contain;" onerror="this.style.display=\'none\'"></td>';
      rows+='<td style="padding:8px;font-size:13px;"><strong>'+info.n+'</strong><br><span style="color:#6b7280;font-size:11px;">'+info.d+'</span></td>';
      rows+='<td style="padding:8px;text-align:center;font-size:13px;font-weight:600;">'+pr.q+'</td>';
      rows+='<td style="padding:8px;text-align:right;font-size:13px;font-weight:700;">'+fp(info.p*pr.q)+'</td>';
      rows+='</tr>';
    });
  });

  var cliBlock='';
  if(c.nom||c.soc||c.adr||c.chan){
    cliBlock='<div style="background:#f9f9f9;border-radius:8px;padding:16px 20px;margin-bottom:24px;font-size:13px;">';
    if(c.chan) cliBlock+='<div style="font-size:15px;font-weight:700;margin-bottom:8px;">'+c.chan+'</div>';
    cliBlock+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;">';
    if(c.nom) cliBlock+='<div><span style="color:#6b7280;font-size:11px;text-transform:uppercase;display:block;">Client</span><strong>'+c.nom+'</strong></div>';
    if(c.soc) cliBlock+='<div><span style="color:#6b7280;font-size:11px;text-transform:uppercase;display:block;">Societe</span><strong>'+c.soc+'</strong></div>';
    if(c.tel) cliBlock+='<div><span style="color:#6b7280;font-size:11px;text-transform:uppercase;display:block;">Telephone</span>'+c.tel+'</div>';
    if(c.email) cliBlock+='<div><span style="color:#6b7280;font-size:11px;text-transform:uppercase;display:block;">Email</span>'+c.email+'</div>';
    if(c.adr) cliBlock+='<div style="grid-column:1/-1"><span style="color:#6b7280;font-size:11px;text-transform:uppercase;display:block;">Adresse</span>'+c.adr+'</div>';
    cliBlock+='</div></div>';
  }

  var refStr=c.ref?' - Ref: '+c.ref:'';
  var win=window.open('','_blank','width=900,height=700');
  if(!win){ window.print(); return; }
  win.document.write('<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Config Ajax - CamProtect</title>'
    +'<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">'
    +'<style>*{margin:0;padding:0;box-sizing:border-box;}'
    +'body{font-family:DM Sans,sans-serif;color:#111;background:#fff;padding:32px;-webkit-print-color-adjust:exact;print-color-adjust:exact;}'
    +'.hd{display:flex;justify-content:space-between;align-items:center;padding-bottom:18px;border-bottom:2px solid #E85D04;margin-bottom:22px;}'
    +'.lb{display:inline-block;border-radius:8px;overflow:hidden;line-height:0;}'
    +'.lb img{height:34px;display:block;padding:8px 14px;background:#1a1a1a;-webkit-print-color-adjust:exact;print-color-adjust:exact;}'
    +'.dt{font-size:12px;color:#6b7280;text-align:right;line-height:1.7;}'
    +'table{width:100%;border-collapse:collapse;}'
    +'.tot{margin-top:24px;border-top:2px solid #111;padding-top:14px;}'
    +'.tr{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;border-bottom:1px solid #e5e7eb;}'
    +'.tr.ttc{font-size:18px;font-weight:800;border-bottom:none;padding-top:10px;}'
    +'.tr.ttc .v{color:#E85D04;} .l{color:#6b7280;} .tr.ttc .l{color:#111;}'
    +'@media print{body{padding:0;}}</style></head><body>'
    +'<div class="hd"><div class="lb"><img src="'+LOGO+'" alt="CamProtect"></div>'
    +'<div class="dt">Genere le '+ds+' a '+ts+'<br>Configuration systeme Ajax'+refStr+'</div></div>'
    +cliBlock
    +'<table><thead><tr style="background:#f9f9f9;">'
    +'<th style="padding:8px;text-align:left;font-size:11px;color:#6b7280;width:52px;"></th>'
    +'<th style="padding:8px;text-align:left;font-size:11px;color:#6b7280;">Produit</th>'
    +'<th style="padding:8px;text-align:center;font-size:11px;color:#6b7280;width:60px;">Qte</th>'
    +'<th style="padding:8px;text-align:right;font-size:11px;color:#6b7280;width:100px;">Prix HT</th>'
    +'</tr></thead><tbody>'+rows+'</tbody></table>'
    +'<div class="tot">'
    +'<div class="tr"><span class="l">Total HT</span><span>'+fp(t)+'</span></div>'
    +'<div class="tr"><span class="l">TVA (20%)</span><span>'+fp(tva)+'</span></div>'
    +'<div class="tr ttc"><span class="l">Total TTC</span><span class="v">'+fp(ttc)+'</span></div>'
    +'</div>'
    +'<script>window.onload=function(){window.print();window.onafterprint=function(){window.close();};};<\/script>'
    +'</body></html>');
  win.document.close();
}

function goNext(){ if(ST.step<5){ST.step++;render();} }
function goPrev(){ if(ST.step>1){ST.step--;render();} }
function doRestart(){
  ST.step=1; ST.type=null; ST.feat={}; ST.ext={}; ST.prods=[];
  ST.cli={nom:'',soc:'',tel:'',email:'',adr:'',chan:'',ref:''};
  ST.grp={i:true,v:false,f:false};
  render();
}

render();
</script>
</body>
</html>
